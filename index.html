<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcaneEXAMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; margin: 0; min-height: 100vh; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%); z-index: -1; pointer-events: none; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            const q = [];
            let start = lines[0]?.toLowerCase().startsWith('id') ? 1 : 0;
            for (let i = start; i < lines.length; i++) {
                const c = lines[i].split(';').map(x => x.trim());
                if (c.length < 2) continue;
                const optionsRaw = c[2] || '';
                const isEssay = optionsRaw.toUpperCase() === 'ESSAY' || !optionsRaw;
                const options = isEssay ? [] : (optionsRaw.includes('|') ? optionsRaw.split('|') : optionsRaw.split(',')).map(o => o.trim());
                q.push({ id: c[0], text: c[1], options, correctAnswer: c[3] || '', imageUrl: c[4], explanation: c[5], isEssay, category: c[6] || 'General', difficulty: c[7] || 'Medium' });
            }
            return q;
        };

        const App = () => {
            const [socket, setSocket] = useState(null);
            const [room, setRoom] = useState(null);
            const [name, setName] = useState('');
            const [joinCode, setJoinCode] = useState('');
            const [answers, setAnswers] = useState({});
            const [paste, setPaste] = useState('');
            const [showPaste, setShowPaste] = useState(false);
            const fileRef = useRef(null);

            useEffect(() => {
                if (typeof io !== 'undefined') {
                    const s = io();
                    setSocket(s);
                    s.on('roomCreated', r => setRoom(r));
                    s.on('roomUpdated', r => setRoom(r));
                    s.on('examStarted', r => setRoom(r));
                    s.on('resetToLobby', r => { setRoom(r); setAnswers({}); });
                    s.on('error', err => alert(err));
                    return () => s.disconnect();
                }
            }, []);

            if (!socket) return <div className="min-h-screen flex items-center justify-center">Connecting to server...</div>;

            if (!room) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700">
                        <h1 className="text-4xl font-black text-center mb-8 text-indigo-400">ArcaneEXAMS</h1>
                        <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:border-indigo-500" placeholder="Your Name" />
                        <div className="space-y-4">
                            <button onClick={() => name.trim() ? socket.emit('createRoom', { userName: name }) : alert('Enter name')} className="w-full bg-indigo-600 hover:bg-indigo-700 font-bold py-3 rounded-lg">Create New Room</button>
                            <div className="flex gap-2">
                                <input type="text" value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase())} className="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500" placeholder="Room Code" />
                                <button onClick={() => name.trim() && joinCode.trim() ? socket.emit('joinRoom', { roomId: joinCode, userName: name }) : alert('Enter name and code')} className="bg-slate-700 hover:bg-slate-600 font-bold px-6 rounded-lg">Join</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const isHost = room.hostId === socket.id;

            if (room.status === 'lobby') return (
                <div className="p-8 max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div className="md:col-span-2 space-y-6">
                        <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-bold">Lobby</h2>
                                <div className="bg-slate-900 px-4 py-2 rounded-lg border border-slate-700 font-mono text-indigo-400 font-bold text-lg">Code: {room.id}</div>
                            </div>
                            {isHost ? (
                                <div>
                                    <div className="p-6 border-2 border-dashed border-slate-600 rounded-xl text-center mb-6">
                                        <h3 className="mb-4">Upload Exam CSV</h3>
                                        <input type="file" ref={fileRef} className="hidden" accept=".csv,.txt" onChange={e => {
                                            const f = e.target.files?.[0];
                                            if (f) { const r = new FileReader(); r.onload = ev => { const q = parseCSV(ev.target.result); if(q.length) socket.emit('updateExam', { roomId: room.id, examData: { questions: q } }); else alert('Invalid'); }; r.readAsText(f); }
                                        }} />
                                        <div className="flex justify-center gap-4">
                                            <button onClick={() => fileRef.current?.click()} className="bg-slate-700 px-6 py-2 rounded-lg">Select File</button>
                                            <button onClick={() => setShowPaste(true)} className="bg-slate-700 px-6 py-2 rounded-lg">Paste Text</button>
                                        </div>
                                    </div>
                                    {showPaste && (
                                        <div className="mb-6">
                                            <textarea value={paste} onChange={e => setPaste(e.target.value)} className="w-full h-32 bg-slate-900 border border-slate-700 p-4 rounded-lg mb-2" placeholder="Paste CSV here..." />
                                            <button onClick={() => { const q = parseCSV(paste); if(q.length) { socket.emit('updateExam', { roomId: room.id, examData: { questions: q } }); setShowPaste(false); } else alert('Invalid'); }} className="bg-indigo-600 px-6 py-2 rounded-lg">Load</button>
                                        </div>
                                    )}
                                    {room.examData && <button onClick={() => socket.emit('startExam', { roomId: room.id })} className="w-full bg-emerald-600 font-bold py-3 rounded-lg">Start Exam ({room.examData.questions.length} Qs)</button>}
                                </div>
                            ) : (
                                <div className="text-center py-12 text-slate-400">Waiting for host to setup exam... {room.examData && <div className="text-emerald-400 mt-4">Exam loaded!</div>}</div>
                            )}
                        </div>
                    </div>
                    <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 h-fit">
                        <h3 className="font-bold mb-4">Participants ({room.users.length})</h3>
                        <ul className="space-y-2">
                            {room.users.map(u => <li key={u.id} className="bg-slate-900 p-3 rounded-lg flex justify-between"><span>{u.name} {u.id === socket.id && '(You)'}</span>{u.id === room.hostId && <span className="text-amber-400 text-xs uppercase">Host</span>}</li>)}
                        </ul>
                    </div>
                </div>
            );

            if (room.status === 'exam') {
                const currentUser = room.users.find(u => u.id === socket.id);
                if (currentUser?.finished) return (
                    <div className="p-8 max-w-3xl mx-auto text-center">
                        <h2 className="text-3xl font-bold mb-4">Waiting for others...</h2>
                        <p className="text-slate-400">You have finished the exam. The leaderboard will appear when everyone is done.</p>
                    </div>
                );

                const [idx, setIdx] = useState(0);
                const q = room.examData.questions[idx];
                const submit = () => {
                    let s = 0;
                    room.examData.questions.forEach((qu, i) => {
                        const a = answers[i];
                        if (a) {
                            if (!qu.isEssay && (a === qu.correctAnswer || a.startsWith(qu.correctAnswer) || qu.correctAnswer.startsWith(a))) s += 100;
                            else if (qu.isEssay && a.trim().length > 10) s += 50;
                        }
                    });
                    socket.emit('submitExam', { roomId: room.id, score: s, answers });
                };
                return (
                    <div className="p-8 max-w-3xl mx-auto flex flex-col min-h-screen">
                        <div className="flex justify-between mb-4 text-slate-400"><span>Q {idx + 1}/{room.examData.questions.length}</span><button onClick={submit}>Submit Early</button></div>
                        <div className="bg-slate-800 p-8 rounded-2xl border border-slate-700 flex-1 mb-6">
                            {q.imageUrl && <img src={q.imageUrl} className="max-h-64 mx-auto mb-6 rounded-xl" />}
                            <h2 className="text-2xl mb-8">{q.text}</h2>
                            <div className="space-y-3">
                                {q.isEssay ? <textarea value={answers[idx] || ''} onChange={e => setAnswers({...answers, [idx]: e.target.value})} className="w-full h-48 bg-slate-900 p-4 rounded-xl" /> : 
                                q.options.map((o, i) => <button key={i} onClick={() => setAnswers({...answers, [idx]: o})} className={`w-full text-left p-4 rounded-xl border-2 ${answers[idx] === o ? 'border-indigo-500 bg-indigo-500/10' : 'border-slate-700'}`}>{o}</button>)}
                            </div>
                        </div>
                        <div className="flex justify-between">
                            <button onClick={() => setIdx(Math.max(0, idx - 1))} disabled={idx === 0} className="px-6 py-3 bg-slate-800 rounded-xl">Prev</button>
                            {idx === room.examData.questions.length - 1 ? <button onClick={submit} className="px-8 py-3 bg-emerald-600 font-bold rounded-xl">Finish</button> : <button onClick={() => setIdx(Math.min(room.examData.questions.length - 1, idx + 1))} className="px-8 py-3 bg-indigo-600 font-bold rounded-xl">Next</button>}
                        </div>
                    </div>
                );
            }

            if (room.status === 'leaderboard') {
                const [showExp, setShowExp] = useState(false);
                const max = room.examData.questions.length * 100;
                const sortedUsers = [...room.users].sort((a, b) => b.score - a.score);
                const currentUser = room.users.find(u => u.id === socket.id);
                const allFinished = room.users.every(u => u.finished);

                return (
                    <div className="p-8 max-w-4xl mx-auto">
                        <h1 className="text-4xl font-black text-center mb-10">Results</h1>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div className="md:col-span-2">
                                <div className="bg-slate-800 p-6 rounded-2xl mb-8 border border-slate-700">
                                    <h2 className="font-bold mb-4">Leaderboard</h2>
                                    <div className="space-y-2">
                                        {sortedUsers.map((u, i) => (
                                            <div key={u.id} className={`p-4 rounded-lg flex justify-between items-center ${u.id === socket.id ? 'bg-indigo-500/20' : 'bg-slate-900'}`}>
                                                <div className="flex items-center gap-4"><div className="w-8 h-8 bg-slate-700 rounded-full flex items-center justify-center font-bold">{i + 1}</div><div>{u.name} {u.id === socket.id && '(You)'} <span className="text-xs text-slate-400 block">{u.finished ? 'Finished' : 'In Progress'}</span></div></div>
                                                {u.finished && <div className="text-right"><div className="text-xl font-bold text-indigo-400">{Math.round((u.score/max)*100)||0}%</div><div className="text-xs text-slate-400">{u.score} pts</div></div>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {allFinished && (
                                    <div className="bg-slate-800 rounded-2xl mb-8 overflow-hidden border border-slate-700">
                                        <button onClick={() => setShowExp(!showExp)} className="w-full p-6 bg-indigo-600/20 text-indigo-300 font-bold text-lg text-left">Review Answers & Explanations</button>
                                        {showExp && <div className="p-4 space-y-4 max-h-[600px] overflow-y-auto">
                                            {room.examData.questions.map((q, i) => {
                                                const a = currentUser?.answers?.[i];
                                                const c = q.isEssay ? (a && a.trim().length > 10) : (a === q.correctAnswer || a?.startsWith(q.correctAnswer) || q.correctAnswer?.startsWith(a));
                                                return (
                                                    <div key={i} className={`p-4 rounded-xl border ${c ? 'border-emerald-500/30 bg-emerald-500/5' : 'border-red-500/30 bg-red-500/5'}`}>
                                                        <h3 className="font-medium mb-2">{i + 1}. {q.text}</h3>
                                                        <div className="text-sm space-y-1 mb-3">
                                                            <div><span className="text-slate-400">Your Answer: </span><span className={c ? 'text-emerald-400' : 'text-red-400'}>{a || 'None'}</span></div>
                                                            {!c && <div><span className="text-slate-400">Correct: </span><span className="text-emerald-400">{q.correctAnswer}</span></div>}
                                                        </div>
                                                        {q.explanation && <div className="p-3 bg-slate-900/50 rounded-lg text-sm text-slate-300"><span className="text-indigo-400 font-bold">Explanation: </span>{q.explanation}</div>}
                                                    </div>
                                                );
                                            })}
                                        </div>}
                                    </div>
                                )}
                            </div>
                            <div className="space-y-6">
                                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                                    <h3 className="font-bold mb-4">Your Stats</h3>
                                    <div className="text-3xl font-black text-indigo-400 mb-1">{currentUser?.score || 0} pts</div>
                                    <div className="text-emerald-400 font-bold">{Math.round(((currentUser?.score || 0)/max)*100)||0}% Accuracy</div>
                                </div>
                                {isHost ? (
                                    <button onClick={() => socket.emit('playAgain', { roomId: room.id })} className="w-full bg-indigo-600 font-bold py-4 rounded-xl">Return to Lobby</button>
                                ) : (
                                    <div className="text-center text-slate-400 p-4 bg-slate-800 rounded-xl border border-slate-700">Waiting for host to return to lobby...</div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
